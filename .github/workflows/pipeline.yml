name: OET PG Schema Build Pipeline
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  schema-pipeline:
    uses: common.yml
    with:
      runs-on: ./.github/workflows/common.yml
      gh_app_id: ${{ vars.GH_ACTIONS_ID }}
    secrets:
      gh_app_token: ${{ secrets.GH_ACTIONS_TOKEN }}
      gh_pat_write: ${{ secrets.OET_PAT_PKG_WRITE }}
